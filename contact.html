<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>اتصل بنا — شبكة قدس الإخبارية</title>
<meta name="description" content="تواصل مع شبكة قدس الإخبارية عبر البريد الإلكتروني أو الهاتف أو نموذج المراسلة. نسعد باستقبال ملاحظاتكم واستفساراتكم على مدار الساعة.">
<meta name="theme-color" content="#2f7fcf">
<link rel="icon" type="image/png" href="assets/img/logo.png">
<meta property="og:type" content="website">
<meta property="og:title" content="اتصل بنا — شبكة قدس الإخبارية">
<meta property="og:image" content="assets/img/logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/pages.css">

<style>
/* page-scoped helpers for the "اتصل بنا" page only */
.contact-social{margin-top:4px;padding-top:18px;border-top:1px solid var(--line)}
.contact-social__label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px}
.contact-social__row{display:flex;flex-wrap:wrap;gap:8px}
</style>
</head>

<body data-page="contact">
<a class="skip-link" href="#main">تخطَّ إلى المحتوى</a>

<div id="qd-header"></div>

<!-- breadcrumb -->
<nav class="breadcrumb" aria-label="مسار التصفّح">
  <div class="container">
    <ol class="breadcrumb__list">
      <li><a href="index.html">الرئيسية</a></li>
      <li><i class="fa-solid fa-angle-left breadcrumb__sep" aria-hidden="true"></i></li>
      <li class="breadcrumb__current">اتصل بنا</li>
    </ol>
  </div>
</nav>

<main id="main">

  <!-- ===== PAGE HERO ===== -->
  <section class="page-hero">
    <span class="page-hero__blob page-hero__blob--1" aria-hidden="true"></span>
    <span class="page-hero__blob page-hero__blob--2" aria-hidden="true"></span>
    <div class="container">
      <span class="page-hero__eyebrow"><i class="fa-regular fa-envelope" aria-hidden="true"></i>اتصل بنا</span>
      <h1 class="page-hero__title">تواصل معنا</h1>
      <p class="page-hero__sub">نسعد بتواصلكم واستقبال ملاحظاتكم واستفساراتكم على مدار الساعة.</p>
    </div>
  </section>

  <!-- ===== CONTACT ===== -->
  <section class="section">
    <div class="container">
      <div class="contact-layout">

        <!-- INFO COLUMN -->
        <div class="contact-info" data-aos="fade-up">
          <div class="contact-card">
            <span class="contact-card__icon"><i class="fa-solid fa-envelope" aria-hidden="true"></i></span>
            <div>
              <div class="contact-card__label">البريد الإلكتروني</div>
              <a class="contact-card__value" href="mailto:info@qudsn.ps">info@qudsn.ps</a>
            </div>
          </div>

          <div class="contact-card">
            <span class="contact-card__icon"><i class="fa-solid fa-phone" aria-hidden="true"></i></span>
            <div>
              <div class="contact-card__label">الهاتف</div>
              <a class="contact-card__value" href="tel:0592202050">0592202050</a>
            </div>
          </div>

          <div class="contact-card contact-card--value-rtl">
            <span class="contact-card__icon"><i class="fa-solid fa-location-dot" aria-hidden="true"></i></span>
            <div>
              <div class="contact-card__label">المقر الرئيسي</div>
              <div class="contact-card__value">رام الله — فلسطين</div>
            </div>
          </div>

          <div class="contact-social">
            <span class="contact-social__label">تابعونا على منصّاتنا</span>
            <div class="contact-social__row">
              <a href="https://www.facebook.com/QudsNet" aria-label="فيسبوك" class="footer__social-link" target="_blank" rel="noopener"><i class="fa-brands fa-facebook-f" aria-hidden="true"></i></a>
              <a href="https://twitter.com/QudsN" aria-label="إكس" class="footer__social-link" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter" aria-hidden="true"></i></a>
              <a href="https://www.instagram.com/qudsn" aria-label="إنستغرام" class="footer__social-link" target="_blank" rel="noopener"><i class="fa-brands fa-instagram" aria-hidden="true"></i></a>
              <a href="https://www.youtube.com/user/QudsNetwork" aria-label="يوتيوب" class="footer__social-link" target="_blank" rel="noopener"><i class="fa-brands fa-youtube" aria-hidden="true"></i></a>
              <a href="https://tiktok.com/@qudsn" aria-label="تيك توك" class="footer__social-link" target="_blank" rel="noopener"><i class="fa-brands fa-tiktok" aria-hidden="true"></i></a>
              <a href="https://t.me/QudsN" aria-label="تيليغرام" class="footer__social-link" target="_blank" rel="noopener"><i class="fa-brands fa-telegram" aria-hidden="true"></i></a>
              <a href="https://whatsapp.com/channel/0029Va54z83IiRp163Clyw3P" aria-label="واتساب" class="footer__social-link" target="_blank" rel="noopener"><i class="fa-brands fa-whatsapp" aria-hidden="true"></i></a>
            </div>
          </div>
        </div>

        <!-- FORM COLUMN -->
        <div data-aos="fade-up" data-aos-delay="100">
          <form class="form" id="contactForm" novalidate>
            <div class="form__success" id="contactSuccess" hidden>
              <i class="fa-solid fa-circle-check" aria-hidden="true"></i>
              <span>تم إرسال رسالتك بنجاح، سنردّ عليك قريبًا.</span>
            </div>

            <div class="form__row">
              <div class="field">
                <label for="contactName">الاسم</label>
                <input id="contactName" name="name" type="text" autocomplete="name" placeholder="اكتب اسمك الكامل" required>
              </div>
              <div class="field">
                <label for="contactEmail">البريد الإلكتروني</label>
                <input id="contactEmail" name="email" type="email" inputmode="email" autocomplete="email" placeholder="example@email.com" required>
              </div>
            </div>

            <div class="field">
              <label for="contactSubject">الموضوع</label>
              <input id="contactSubject" name="subject" type="text" placeholder="موضوع الرسالة">
            </div>

            <div class="field">
              <label for="contactMessage">الرسالة</label>
              <textarea id="contactMessage" name="message" placeholder="اكتب رسالتك هنا..." required></textarea>
            </div>

            <button class="btn btn--primary" type="submit"><i class="fa-regular fa-paper-plane" aria-hidden="true"></i><span>إرسال الرسالة</span></button>
          </form>

          <!-- MAP -->
          <div class="map">
            <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=35.18%2C31.88%2C35.24%2C31.93&layer=mapnik&marker=31.9038%2C35.2034" title="موقع شبكة قدس — رام الله" loading="lazy"></iframe>
          </div>
        </div>

      </div>
    </div>
  </section>

</main>

<div id="qd-footer"></div>
<div id="qd-search"></div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script src="assets/js/components.js" defer></script>
<script src="assets/js/main.js" defer></script>
</body>
</html>
